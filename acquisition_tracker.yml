name: Acquisition Tracker

on:
  schedule:
    # ── Every other Monday at 8 AM UTC ──────────────────────────────────
    # For weekly runs, change to: '0 8 * * 1'
    # For biweekly runs, keep as: '0 8 * * 1/2'  (every 2nd Monday)
    - cron: '0 8 1-7,15-21 * 1'   # biweekly — 1st and 3rd Monday of each month

  # Manual trigger from the GitHub Actions tab (great for testing)
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    # Write permission needed to commit seen.json back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run acquisition tracker
        env:
          EMAIL: ${{ secrets.EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # optional — enrichment only
        run: |
          python src/main.py

      # Commit the updated seen.json so future runs skip already-reported deals
      - name: Commit seen.json
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen.json
          git diff --staged --quiet || git commit -m "chore: update seen.json [skip ci]"
          git push
